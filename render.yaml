services:
  - type: web
    name: workplus-backend
    env: node
    plan: standard
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CORS_ORIGIN
        value: https://workplus-murex.vercel.app
      - key: SUPER_ADMIN_EMAIL
        value: superadmin@company.com
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: SUPER_ADMIN_NAME
        value: Super Admin
      - key: SMTP_HOST
        value: smtp.office365.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        value: hr@hexerve.com
      - key: HR_EMAIL
        value: hr@hexerve.com
      - key: TWILIO_ACCOUNT_SID
        value: your-twilio-account-sid
      - key: TWILIO_AUTH_TOKEN
        value: your-twilio-auth-token
      - key: TWILIO_PHONE_NUMBER
        value: +1234567890
      - key: FIREBASE_PROJECT_ID
        value: your-firebase-project-id
      - key: FIREBASE_PRIVATE_KEY
        value: your-firebase-private-key
      - key: FIREBASE_CLIENT_EMAIL
        value: your-firebase-client-email
      - key: VITE_API_URL
        value: https://workplus-backend-sg3a.onrender.com
      - key: VITE_SOCKET_URL
        value: https://workplus-backend-sg3a.onrender.com
      - key: VITE_APP_NAME
        value: WorkPlus Pro
      - key: VITE_APP_VERSION
        value: 1.0.0
      - key: VITE_APP_ENV
        value: production
      - key: VITE_ENABLE_DEBUG
        value: false
      - key: VITE_ENABLE_ANALYTICS
        value: true
      - key: TEAMS_APP_ID
        value: 7b85498f-d7ec-4f0d-a60b-fa6baf6391d2
      - key: TEAMS_APP_PASSWORD
        sync: false
      - key: TEAMS_TENANT_ID
        value: 4d3f5d68-c721-43c9-8f42-a05555c64d4a
      - key: TEAMS_BOT_ID
        value: 7b85498f-d7ec-4f0d-a60b-fa6baf6391d2
      - key: TEAMS_BOT_PASSWORD
        sync: false
      - key: TEAMS_WEBHOOK_URL
        value: https://workplus-backend-sg3a.onrender.com/api/chat/teams/webhook
      - key: TEAMS_INTEGRATION_ENABLED
        value: true
      - key: TEAMS_MESSAGE_SYNC_ENABLED
        value: true
      - key: TEAMS_PRESENCE_SYNC_ENABLED
        value: true
      - key: TEAMS_FILE_SHARING_ENABLED
        value: true
      - key: TEAMS_MESSAGE_RETENTION_DAYS
        value: 90
      - key: TEAMS_API_RATE_LIMIT
        value: 100
      - key: TEAMS_API_RATE_LIMIT_WINDOW
        value: 60000
      - key: TEAMS_LOG_LEVEL
        value: info
      - key: TEAMS_LOG_MESSAGES
        value: true

databases:
  - name: workplus-db
    databaseName: workpluspro
    user: workplus_user
    plan: standard
